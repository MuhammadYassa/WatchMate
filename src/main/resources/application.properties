spring.application.name=WatchMate
# --- MySQL Database Configuration ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JPA (Hibernate) Config ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.batch_size=50

# --- Flyway Schema Migrations ---
spring.flyway.enabled=true

# --- JWT Config & Security ---
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry-minutes=${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:15}

# --- API Keys and Tokens ---
tmdb.api.token=${TMDB_API_TOKEN}
watchmate.tmdb.default-region=${WATCHMATE_TMDB_DEFAULT_REGION:US}
watchmate.tmdb.cast-limit=${WATCHMATE_TMDB_CAST_LIMIT:10}

# --- Links/Domains/Emails ---
app.domain=${APP_DOMAIN}
verified.sender=${VERIFIED_SENDER}

# --- Redis Configuration ---
spring.cache.type=redis

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2s

watchmate.cache.enabled=${WATCHMATE_CACHE_ENABLED}
watchmate.cors.allowed-origins=${WATCHMATE_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
watchmate.discovery.sync.cron=${WATCHMATE_DISCOVERY_SYNC_CRON:0 59 23 * * *}
watchmate.discovery.sync.startup-enabled=${WATCHMATE_DISCOVERY_SYNC_STARTUP_ENABLED:true}
watchmate.show-hydration.max-synchronous-missing-seasons=${WATCHMATE_SHOW_HYDRATION_MAX_SYNCHRONOUS_MISSING_SEASONS:3}
watchmate.show-hydration.max-synchronous-episodes=${WATCHMATE_SHOW_HYDRATION_MAX_SYNCHRONOUS_EPISODES:100}
watchmate.show-hydration.batch-size=${WATCHMATE_SHOW_HYDRATION_BATCH_SIZE:1}
watchmate.show-jobs.enabled=${WATCHMATE_SHOW_JOBS_ENABLED:true}
watchmate.show-jobs.poll-delay-ms=${WATCHMATE_SHOW_JOBS_POLL_DELAY_MS:5000}
watchmate.show-jobs.max-jobs-per-poll=${WATCHMATE_SHOW_JOBS_MAX_JOBS_PER_POLL:3}
watchmate.show-jobs.stale-running-minutes=${WATCHMATE_SHOW_JOBS_STALE_RUNNING_MINUTES:15}
watchmate.show-jobs.max-attempts=${WATCHMATE_SHOW_JOBS_MAX_ATTEMPTS:3}

# --- Rate Limiting ---
watchmate.rate-limit.enabled=${WATCHMATE_RATE_LIMIT_ENABLED:true}
watchmate.rate-limit.login-capacity=${WATCHMATE_RATE_LIMIT_LOGIN_CAPACITY:5}
watchmate.rate-limit.login-refill-seconds=${WATCHMATE_RATE_LIMIT_LOGIN_REFILL_SECONDS:60}
watchmate.rate-limit.register-capacity=${WATCHMATE_RATE_LIMIT_REGISTER_CAPACITY:3}
watchmate.rate-limit.register-refill-seconds=${WATCHMATE_RATE_LIMIT_REGISTER_REFILL_SECONDS:60}
watchmate.rate-limit.resend-capacity=${WATCHMATE_RATE_LIMIT_RESEND_CAPACITY:2}
watchmate.rate-limit.resend-refill-seconds=${WATCHMATE_RATE_LIMIT_RESEND_REFILL_SECONDS:60}
watchmate.rate-limit.refresh-capacity=${WATCHMATE_RATE_LIMIT_REFRESH_CAPACITY:10}
watchmate.rate-limit.refresh-refill-seconds=${WATCHMATE_RATE_LIMIT_REFRESH_REFILL_SECONDS:60}
watchmate.rate-limit.bucket-ttl-seconds=${WATCHMATE_RATE_LIMIT_BUCKET_TTL_SECONDS:3600}
watchmate.rate-limit.bucket-cleanup-interval-seconds=${WATCHMATE_RATE_LIMIT_BUCKET_CLEANUP_INTERVAL_SECONDS:300}

# --- Refresh Token Cleanup ---
watchmate.refresh-token.cleanup.cron=${WATCHMATE_REFRESH_TOKEN_CLEANUP_CRON:0 0 3 * * *}
watchmate.refresh-token.cleanup.revoked-retention-days=${WATCHMATE_REFRESH_TOKEN_REVOKED_RETENTION_DAYS:7}
