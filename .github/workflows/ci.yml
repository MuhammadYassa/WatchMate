name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    name: Build, Test, and Package
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-placeholder-secret
      TMDB_API_TOKEN: ci-placeholder-token
      APP_DOMAIN: http://localhost:8080
      VERIFIED_SENDER: ci@example.com
      DB_URL: jdbc:mysql://localhost:3306/watchmate
      DB_USERNAME: watchmate
      DB_PASSWORD: ci_password

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Docker availability for Testcontainers
        run: docker info

      - name: Build and run tests
        run: mvn -B clean verify

      - name: Build Docker image
        run: docker build -t watchmate:ci .
